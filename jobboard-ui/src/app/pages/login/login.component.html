<div class="container mt-5">

  <div class="row justify-content-center">

    <div class="col-md-4">

      <div class="card">

        <div class="card-header">
          <h3>Login</h3>
        </div>

        <div class="card-body">

          <div class="mb-3">
            <label>Email</label>

            <input
              type="email"
              class="form-control"
              [(ngModel)]="email">
          </div>

          <div class="mb-3">
            <label>Password</label>

            <input
              type="password"
              class="form-control"
              [(ngModel)]="password">
          </div>

          <div class="text-center mt-3">
            <a routerLink="/register">
            Create Account
            </a>
          </div>

          <button
            class="btn btn-primary w-100"
            (click)="login()">

            Login

          </button>

        </div>

      </div>

    </div>

  </div>

</div>
