<div class="container mt-4 card shadow-sm border-0">

  <h2 class="mb-4">
    Available Jobs
  </h2>

  <!-- Filters -->

  <div class="row mb-4">

    <div class="col-md-4">

      <input
        class="form-control"
        placeholder="Search Job Title"
        [(ngModel)]="searchTerm"
        (input)="filterJobs()">

    </div>

    <div class="col-md-4">

      <input
        class="form-control"
        placeholder="Location"
        [(ngModel)]="selectedLocation"
        (input)="filterJobs()">

    </div>

    <div class="col-md-4">

      <select
        class="form-control"
        [(ngModel)]="selectedEmploymentType"
        (change)="filterJobs()">

        <option value="">All Types</option>
        <option value="Full Time">Full Time</option>
        <option value="Part Time">Part Time</option>
        <option value="Remote">Remote</option>

      </select>

    </div>

  </div>

  <!-- Job Cards -->

  <div class="row">

    <div
      class="col-md-4 mb-4"
      *ngFor="let job of jobs">

      <div class="card h-100">

        <div class="card-body">

          <h4>{{ job.title }}</h4>

          <p>{{ job.description }}</p>

          <p>
            <strong>Location:</strong>
            {{ job.location }}
          </p>

          <p>
            <strong>Salary:</strong>
            ₹{{ job.salary }}
          </p>

          <p>
            <strong>Type:</strong>
            {{ job.employmentType }}
          </p>

          <button
            class="btn btn-primary"
            (click)="apply(job.id)">

            Apply

          </button>

        </div>

      </div>

    </div>

  </div>

</div>
