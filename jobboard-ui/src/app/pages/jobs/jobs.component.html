<div class="container mt-4">

  <!-- Header -->

  <div class="mb-4">

    <h2 class="fw-bold">
      Available Jobs
    </h2>

    <p class="text-muted">
      Discover opportunities that match your skills
    </p>

  </div>

  <!-- Filters -->

  <div class="row g-3 mb-4">

    <div class="col-md-4">

      <input
        class="form-control"
        placeholder="Search Job Title"
        [(ngModel)]="searchTerm"
        (input)="filterJobs()">

    </div>

    <div class="col-md-4">

      <input
        class="form-control"
        placeholder="Location"
        [(ngModel)]="selectedLocation"
        (input)="filterJobs()">

    </div>

    <div class="col-md-4">

      <select
        class="form-control"
        [(ngModel)]="selectedEmploymentType"
        (change)="filterJobs()">

        <option value="">
          All Types
        </option>

        <option value="Full Time">
          Full Time
        </option>

        <option value="Part Time">
          Part Time
        </option>

        <option value="Remote">
          Remote
        </option>

      </select>

    </div>

  </div>

  <!-- Jobs Grid -->

  <div class="row">

    <div
      class="col-md-4 mb-4"
      *ngFor="let job of jobs">

      <div class="card shadow-sm border-0 h-100">

        <div class="card-body d-flex flex-column">

          <h4 class="fw-bold mb-3">

            <i class="bi bi-briefcase-fill text-primary me-2"></i>

            {{ job.title }}

          </h4>

          <p class="text-muted">

            {{ job.description }}

          </p>

          <div class="mt-auto">

            <p class="mb-2">

              <i class="bi bi-geo-alt-fill text-danger me-2"></i>

              {{ job.location }}

            </p>

            <p class="mb-2">

              <i class="bi bi-cash-stack text-success me-2"></i>

              ₹{{ job.salary }}

            </p>

            <p class="mb-3">

              <i class="bi bi-clock-fill text-info me-2"></i>

              {{ job.employmentType }}

            </p>

            <button
              class="btn btn-primary w-100"
              (click)="apply(job.id)">

              <i class="bi bi-send-fill me-2"></i>

              Apply Now

            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
