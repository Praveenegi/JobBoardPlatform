<div class="container mt-4">

  <div class="mb-4">

    <h2 class="fw-bold">
      Applicants
    </h2>

    <p class="text-muted">
      Review candidates and manage hiring decisions
    </p>

  </div>

  <div
    class="card shadow-sm border-0 mb-3"
    *ngFor="let app of applications">

    <div class="card-body">

      <div class="d-flex justify-content-between align-items-start">

        <div>

          <h5 class="fw-bold mb-1">
            <i class="bi bi-person-fill me-2"></i>
            {{ app.candidateName }}
          </h5>

          <p class="text-muted mb-2">
            <i class="bi bi-envelope-fill me-2"></i>
            {{ app.candidateEmail }}
          </p>

        </div>

        <span
          class="badge rounded-pill"
          [ngClass]="{
            'bg-secondary': app.status === 'Applied',
            'bg-primary': app.status === 'Interview',
            'bg-success': app.status === 'Selected',
            'bg-danger': app.status === 'Rejected'
          }">

          {{ app.status }}

        </span>

      </div>

      <hr>

      <div class="mb-3">

        <a
          *ngIf="app.resumeUrl"
          [href]="'https://jobboard-api-praveen-f0csekc9adg5gmbb.centralindia-01.azurewebsites.net' + app.resumeUrl"
          target="_blank"
          class="btn btn-outline-primary me-2">

          <i class="bi bi-file-earmark-pdf-fill me-1"></i>
          View Resume

        </a>

      </div>

      <div class="d-flex flex-wrap gap-2">

        <button
          class="btn btn-info text-white"
          (click)="updateStatus(
            app.applicationId,
            'Interview')">

          <i class="bi bi-calendar-check-fill me-1"></i>
          Interview

        </button>

        <button
          class="btn btn-success"
          (click)="updateStatus(
            app.applicationId,
            'Selected')">

          <i class="bi bi-check-circle-fill me-1"></i>
          Select

        </button>

        <button
          class="btn btn-danger"
          (click)="updateStatus(
            app.applicationId,
            'Rejected')">

          <i class="bi bi-x-circle-fill me-1"></i>
          Reject

        </button>

      </div>

    </div>

  </div>

</div>
