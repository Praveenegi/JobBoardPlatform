<div class="container mt-4 card shadow-sm border-0">

  <h2 class="mb-4">
    My Applications
  </h2>

  <div
    class="card mb-3 shadow-sm"
    *ngFor="let app of applications">

    <div class="card-body">

      <h4>
        {{ app.jobTitle }}
      </h4>

      <p class="mb-1">
        📍 {{ app.location }}
      </p>

      <p class="mb-1">
        💼 {{ app.employmentType }}
      </p>

      <p class="mb-2">
        ₹ {{ app.salary }}
      </p>

      <span
        class="badge"
        [ngClass]="{
          'bg-secondary':
            app.status === 'Applied',

          'bg-primary':
            app.status === 'Interview',

          'bg-success':
            app.status === 'Selected',

          'bg-danger':
            app.status === 'Rejected'
        }">

        {{ app.status }}

      </span>

      <p class="mt-3 mb-0">

        Applied On:
        {{ app.appliedAt
            | date:'medium' }}

      </p>

    </div>

  </div>

</div>
